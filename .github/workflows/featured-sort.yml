name: Sort Featured

on:
  schedule:
    - cron: "15 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sort:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reorder featured cards by stars
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/sort-featured.py
      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md
          if git commit -m "sort featured by stars [skip ci]"; then git push; fi
